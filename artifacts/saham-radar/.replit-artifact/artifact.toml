kind = "web"
previewPath = "/"
title = "SahamRadar AI"
version = "1.0.0"
id = "artifacts/saham-radar"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19024

[services.development]
run = "pnpm --filter @workspace/saham-radar run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/saham-radar", "run", "build" ]
publicDir = "artifacts/saham-radar/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19024"
BASE_PATH = "/"
